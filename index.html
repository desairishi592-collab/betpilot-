<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BetPilot</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080C16;--surface:#0E1420;--card:#141B2D;--border:#1E2A42;--border2:#2A3A5C;
  --teal:#00E5B4;--teal2:#00B890;--amber:#FFB627;--red:#FF4757;--green:#2ED573;
  --txt:#EEF2FF;--muted:#6B7FA3;--dim:#2A3450;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt)}

/* SETUP */
.setup{position:fixed;inset:0;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;overflow-y:auto}
.setup-box{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:32px;max-width:380px;width:100%}
.setup-logo{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:700;color:var(--teal);letter-spacing:2px;margin-bottom:4px}
.setup-sub{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:24px}
.setup-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;display:block}
.setup-input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;color:var(--txt);font-size:16px;font-family:'Inter',sans-serif;margin-bottom:14px}
.setup-input:focus{outline:none;border-color:var(--teal)}
.risk-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:22px}
.risk-opt{padding:11px 6px;border-radius:10px;border:1px solid var(--border2);background:var(--surface);cursor:pointer;text-align:center;transition:all .15s}
.risk-opt.on{border-color:var(--teal);background:rgba(0,229,180,.08)}
.risk-name{font-size:12px;font-weight:600;color:var(--txt);display:block;margin-bottom:3px}
.risk-opt.on .risk-name{color:var(--teal)}
.risk-desc{font-size:10px;color:var(--muted);line-height:1.3}
.setup-btn{width:100%;background:var(--teal);color:#080C16;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}

/* LAYOUT */
.app{display:none;height:100vh;overflow:hidden}
@media(min-width:769px){.app{display:grid;grid-template-columns:1fr 320px}.mobile-nav{display:none}.desktop-sidebar{display:flex!important;flex-direction:column}}
@media(max-width:768px){.app{display:flex;flex-direction:column}.desktop-sidebar{display:none!important}.mobile-nav{display:flex}.chat-panel{flex:1;min-height:0}}

/* CHAT */
.chat-panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.chat-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
.chat-logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--teal);letter-spacing:1px;flex-shrink:0}
.sport-tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex:1}
.sport-tabs::-webkit-scrollbar{display:none}
.sport-pill{padding:5px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;transition:all .15s;flex-shrink:0}
.sport-pill.on{background:var(--teal);color:#080C16;border-color:var(--teal);font-weight:600}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg{max-width:88%;display:flex;flex-direction:column;gap:3px}
.msg.user{align-self:flex-end}
.msg.ai{align-self:flex-start}
.msg-bubble{padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.6;word-break:break-word}
.msg.user .msg-bubble{background:var(--teal);color:#080C16;border-radius:16px 16px 4px 16px;font-weight:500}
.msg.ai .msg-bubble{background:var(--card);border:1px solid var(--border2);border-radius:16px 16px 16px 4px}
.msg-time{font-size:10px;color:var(--muted)}
.msg.user .msg-time{text-align:right}

/* BET CARD */
.bet-card{background:var(--surface);border:1px solid var(--teal);border-radius:12px;padding:14px;margin-top:8px}
.bet-card-sport{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--teal);margin-bottom:5px;font-weight:600}
.bet-card-matchup{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px;line-height:1.2}
.bet-card-pick{font-size:12px;color:var(--muted);margin-bottom:10px}
.bet-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.bet-stat{background:var(--card);border-radius:8px;padding:7px 8px;text-align:center}
.bet-stat-val{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:600}
.bet-stat-lbl{font-size:10px;color:var(--muted);margin-top:1px;text-transform:uppercase}
.bet-actions{display:flex;gap:8px}
.bet-btn{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.bet-btn.yes{background:var(--teal);color:#080C16}
.bet-btn.no{background:var(--dim);color:var(--muted);border:1px solid var(--border2)}

/* TYPING */
.typing{align-self:flex-start;display:flex;gap:5px;align-items:center;padding:12px 14px;background:var(--card);border:1px solid var(--border2);border-radius:16px 16px 16px 4px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block;animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* INPUT */
.input-area{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.quick-btns{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:8px;padding-bottom:2px}
.quick-btns::-webkit-scrollbar{display:none}
.quick-btn{padding:6px 11px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;flex-shrink:0}
.quick-btn:active{border-color:var(--teal);color:var(--teal)}
.input-row{display:flex;gap:8px;align-items:center}
.chat-input{flex:1;background:var(--card);border:1px solid var(--border2);border-radius:24px;padding:11px 16px;color:var(--txt);font-size:16px;font-family:'Inter',sans-serif}
.chat-input:focus{outline:none;border-color:var(--teal)}
.send-btn{width:42px;height:42px;border-radius:50%;background:var(--teal);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn svg{width:16px;height:16px;fill:#080C16}

/* DESKTOP SIDEBAR */
.desktop-sidebar{background:var(--surface);border-left:1px solid var(--border);overflow:hidden}
.bankroll-section{padding:18px;border-bottom:1px solid var(--border)}
.br-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.br-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.settings-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px}
.br-num{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:3px}
.br-growth{font-size:12px;font-weight:600;margin-bottom:8px}
.meter-track{height:4px;background:var(--dim);border-radius:2px;overflow:hidden}
.meter-fill{height:100%;border-radius:2px;background:var(--teal);transition:width .6s}
.meter-fill.warn{background:var(--amber)}
.meter-fill.crit{background:var(--red)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.stat-box{background:var(--card);border-radius:8px;padding:9px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:600}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:1px;text-transform:uppercase;letter-spacing:.4px}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border)}
.stab{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;border-bottom:2px solid transparent}
.stab.on{color:var(--teal);border-bottom-color:var(--teal)}
.bets-scroll{overflow-y:auto;flex:1;padding:12px}
.bets-scroll::-webkit-scrollbar{width:3px}
.bets-scroll::-webkit-scrollbar-thumb{background:var(--border2)}
.bet-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px;margin-bottom:8px;border-left:3px solid var(--amber)}
.bet-item.won{border-left-color:var(--green)}
.bet-item.lost{border-left-color:var(--red)}
.bet-item.pushed{border-left-color:var(--muted)}
.bi-matchup{font-size:13px;font-weight:600;margin-bottom:3px}
.bi-detail{font-size:11px;color:var(--muted);margin-bottom:7px}
.bi-row{display:flex;justify-content:space-between;align-items:center}
.bi-amt{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:600}
.settle-btns{display:flex;gap:3px}
.s-btn{padding:4px 7px;border-radius:5px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.s-btn.w{background:rgba(46,213,115,.15);color:var(--green)}
.s-btn.l{background:rgba(255,71,87,.15);color:var(--red)}
.s-btn.p{background:var(--dim);color:var(--muted)}
.empty-bets{text-align:center;padding:28px 10px;color:var(--muted);font-size:13px;line-height:1.6}
.clear-btn{width:100%;padding:9px;border-radius:8px;border:1px solid rgba(255,71,87,.3);background:rgba(255,71,87,.08);color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px}
.clear-btn:hover{background:rgba(255,71,87,.15)}

/* MOBILE NAV */
.mobile-nav{display:none;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.mobile-nav-tabs{display:flex}
.mnav-btn{flex:1;padding:10px 4px;border:none;background:transparent;color:var(--muted);font-size:10px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;gap:3px;border-top:2px solid transparent}
.mnav-btn.on{color:var(--teal);border-top-color:var(--teal)}
.mnav-icon{font-size:18px;line-height:1}
.mobile-panel{display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden}
.mobile-panel.active{display:flex}

.auto-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.auto-badge.won{background:rgba(46,213,115,.15);color:var(--green)}
.auto-badge.lost{background:rgba(255,71,87,.15);color:var(--red)}
.auto-badge.pushed{background:var(--dim);color:var(--muted)}

.hidden{display:none!important}
</style>
</head>
<body>

<!-- SETUP -->
<div class="setup" id="setup">
  <div class="setup-box">
    <div class="setup-logo">BETPILOT</div>
    <div class="setup-sub">AI sports betting advisor for NFL, NBA, NHL, MLB &amp; World Cup. Tells you who to bet on and how much — you just say yes or no.</div>
    <label class="setup-label">Your starting bankroll ($)</label>
    <input class="setup-input" type="number" id="setupBankroll" value="100" min="10" inputmode="decimal">
    <label class="setup-label">Risk profile</label>
    <div class="risk-row">
      <div class="risk-opt" data-r="conservative" onclick="pickRisk(this)"><span class="risk-name">Safe</span><span class="risk-desc">Max 3% per bet</span></div>
      <div class="risk-opt on" data-r="moderate" onclick="pickRisk(this)"><span class="risk-name">Moderate</span><span class="risk-desc">Max 5% per bet</span></div>
      <div class="risk-opt" data-r="aggressive" onclick="pickRisk(this)"><span class="risk-name">Bold</span><span class="risk-desc">Max 8% per bet</span></div>
    </div>
    <button class="setup-btn" onclick="startApp()">Let's go →</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <div class="chat-logo">BETPILOT</div>
      <div class="sport-tabs" id="sportTabs">
        <button class="sport-pill on" data-s="NFL" onclick="setSport(this)">🏈 NFL</button>
        <button class="sport-pill" data-s="NBA" onclick="setSport(this)">🏀 NBA</button>
        <button class="sport-pill" data-s="NHL" onclick="setSport(this)">🏒 NHL</button>
        <button class="sport-pill" data-s="MLB" onclick="setSport(this)">⚾ MLB</button>
        <button class="sport-pill" data-s="World Cup" onclick="setSport(this)">⚽ World Cup</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="quick-btns">
        <button class="quick-btn" onclick="quickSend('What games are on today?')">📅 Today's games</button>
        <button class="quick-btn" onclick="quickSend('What is the best bet right now?')">🔥 Best bet now</button>
        <button class="quick-btn" onclick="quickSend('Give me a safe pick today')">🛡 Safe pick</button>
        <button class="quick-btn" onclick="quickSend('How is my bankroll doing?')">💰 Bankroll</button>
        <button class="quick-btn" onclick="quickSend('Give me a parlay suggestion for today')">🎰 Parlay</button>
      </div>
      <div class="input-row">
        <input class="chat-input" id="chatInput" placeholder="Ask about any game..." onkeydown="if(event.key==='Enter'){event.preventDefault();sendMsg()}">
        <button class="send-btn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- DESKTOP SIDEBAR -->
  <div class="desktop-sidebar" id="desktopSidebar">
    <div class="bankroll-section">
      <div class="br-top"><span class="br-label">Bankroll</span><button class="settings-btn" onclick="openSetup()">⚙</button></div>
      <div class="br-num" id="brNum">$0</div>
      <div class="br-growth" id="brGrowth"></div>
      <div class="meter-track"><div class="meter-fill" id="brMeter" style="width:100%"></div></div>
      <div class="stats-grid" id="statsGrid"></div>
    </div>
    <div class="sidebar-tabs">
      <button class="stab on" id="dTabOpen" onclick="dSideTab('open')">Open Bets</button>
      <button class="stab" id="dTabHistory" onclick="dSideTab('history')">History</button>
      <button class="stab" id="dTabStats" onclick="dSideTab('stats')">Stats</button>
    </div>
    <div class="bets-scroll" id="dViewOpen"></div>
    <div class="bets-scroll hidden" id="dViewHistory"></div>
    <div class="bets-scroll hidden" id="dViewStats"></div>
  </div>

  <!-- MOBILE NAV -->
  <div class="mobile-nav">
    <div class="mobile-nav-tabs">
      <button class="mnav-btn on" id="mnavChat" onclick="mobileTab('chat')"><span class="mnav-icon">💬</span>Chat</button>
      <button class="mnav-btn" id="mnavBankroll" onclick="mobileTab('bankroll')"><span class="mnav-icon">💰</span>Bankroll</button>
      <button class="mnav-btn" id="mnavBets" onclick="mobileTab('bets')"><span class="mnav-icon">📋</span>Bets</button>
      <button class="mnav-btn" id="mnavHistory" onclick="mobileTab('history')"><span class="mnav-icon">📋</span>History</button>
      <button class="mnav-btn" id="mnavStats" onclick="mobileTab('stats')"><span class="mnav-icon">📈</span>Stats</button>
    </div>
  </div>
</div>

<script>
/* ── DATA LAYER ── */
const ESPN = {
  NFL:'https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard',
  NBA:'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard',
  NHL:'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard',
  MLB:'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard',
  'World Cup':'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard'
};
const ESPN_BASE = {
  NFL:'football/nfl',NBA:'basketball/nba',NHL:'hockey/nhl',
  MLB:'baseball/mlb','World Cup':'soccer/fifa.world'
};
function espnUrl(sport,path){return`https://site.api.espn.com/apis/site/v2/sports/${ESPN_BASE[sport]}/${path}`}
async function safeJson(url){try{const r=await fetch(url);return await r.json()}catch(e){return null}}

async function fetchTeamInjuries(sport,teamId){
  if(sport==='World Cup')return'';
  const d=await safeJson(espnUrl(sport,`teams/${teamId}/injuries`));
  const items=d?.injuries||[];
  if(!items.length)return'None reported';
  return items.slice(0,4).map(i=>`${i.athlete?.displayName||'?'} (${i.athlete?.position?.abbreviation||'?'}) — ${i.status||'Questionable'}`).join(', ');
}

async function fetchTeamForm(sport,teamId){
  const d=await safeJson(espnUrl(sport,`teams/${teamId}/schedule`));
  const events=d?.events||[];
  const done=events.filter(e=>e.competitions?.[0]?.status?.type?.completed).slice(-5);
  if(!done.length)return'No recent data';
  return done.map(e=>{
    const comp=e.competitions[0];
    const w=comp.competitors.find(c=>c.winner);
    const l=comp.competitors.find(c=>!c.winner);
    if(!w)return'Draw';
    return`${w.team.abbreviation} def ${l.team.abbreviation} ${w.score}-${l.score}`;
  }).join(' | ');
}

async function fetchTeamNews(sport,teamId){
  const d=await safeJson(espnUrl(sport,`teams/${teamId}/news`));
  const items=d?.articles||[];
  if(!items.length)return'';
  return items.slice(0,2).map(a=>a.headline).join(' | ');
}

async function fetchStandings(sport){
  const d=await safeJson(espnUrl(sport,'standings'));
  if(!d)return'';
  try{
    const groups=d.standings?.entries||d.children?.[0]?.standings?.entries||[];
    if(!groups.length)return'';
    return groups.slice(0,8).map(e=>{
      const rec=e.stats?.find(s=>s.name==='wins')?.displayValue||'';
      return`${e.team?.displayName||'?'}: ${rec}`;
    }).join(', ');
  }catch(e){return''}
}

/* Polymarket: fetch active sports markets matching today's teams */
async function fetchPolymarketOdds(homeTeam,awayTeam){
  try{
    // Search Polymarket's gamma API for markets matching these teams
    const q=encodeURIComponent(`${homeTeam} ${awayTeam}`);
    const d=await safeJson(`https://gamma-api.polymarket.com/markets?search=${q}&limit=5&active=true`);
    if(!d||!d.length)return'';
    const market=d[0];
    if(!market.outcomes||!market.outcomePrices)return'';
    const outcomes=JSON.parse(market.outcomes||'[]');
    const prices=JSON.parse(market.outcomePrices||'[]');
    if(!outcomes.length)return'';
    const parts=outcomes.map((o,i)=>`${o}: ${(parseFloat(prices[i]||0)*100).toFixed(0)}%`);
    return`Prediction market: ${parts.join(', ')} (${market.volume?'$'+Math.round(market.volume)+' volume':''})`;
  }catch(e){return''}
}

async function fetchSchedule(sport){
  const d=await safeJson(ESPN[sport]);
  const events=d?.events||[];
  if(!events.length)return`No ${sport} games today.`;
  return events.map(e=>{
    const comp=e.competitions[0];
    const home=comp.competitors.find(c=>c.homeAway==='home');
    const away=comp.competitors.find(c=>c.homeAway==='away');
    const status=e.status.type.description;
    const time=status==='Scheduled'?new Date(e.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):status;
    const score=status!=='Scheduled'?` (${away.score||0}-${home.score||0})`:'';
    return`${away.team.displayName} @ ${home.team.displayName} — ${time}${score}`;
  }).join('\n');
}

async function fetchFullContext(sport){
  const d=await safeJson(ESPN[sport]);
  const events=d?.events||[];
  if(!events.length)return`No ${sport} games today.`;

  // fetch standings once
  const standings=await fetchStandings(sport);

  const lines=[];
  for(const e of events.slice(0,5)){
    const comp=e.competitions[0];
    const home=comp.competitors.find(c=>c.homeAway==='home');
    const away=comp.competitors.find(c=>c.homeAway==='away');
    const status=e.status.type.description;
    const time=status==='Scheduled'?new Date(e.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):status;
    const score=status!=='Scheduled'?` | Score: ${away.score||0}-${home.score||0}`:'';
    const homeRec=home.records?.[0]?.summary||'';
    const awayRec=away.records?.[0]?.summary||'';

    // fetch all data sources in parallel
    const [hi,ai,hf,af,hn,an,poly]=await Promise.all([
      fetchTeamInjuries(sport,home.team.id),
      fetchTeamInjuries(sport,away.team.id),
      fetchTeamForm(sport,home.team.id),
      fetchTeamForm(sport,away.team.id),
      fetchTeamNews(sport,home.team.id),
      fetchTeamNews(sport,away.team.id),
      fetchPolymarketOdds(home.team.displayName,away.team.displayName),
    ]);

    lines.push(
      `GAME: ${away.team.displayName}${awayRec?' ('+awayRec+')':''} @ ${home.team.displayName}${homeRec?' ('+homeRec+')':''} — ${time}${score}\n`+
      `  Injuries ${home.team.displayName}: ${hi||'None'}\n`+
      `  Injuries ${away.team.displayName}: ${ai||'None'}\n`+
      `  Form ${home.team.displayName} (last 5): ${hf}\n`+
      `  Form ${away.team.displayName} (last 5): ${af}\n`+
      (hn?`  News ${home.team.displayName}: ${hn}\n`:'')+
      (an?`  News ${away.team.displayName}: ${an}\n`:'')+
      (poly?`  ${poly}\n`:'')
    );
  }

  return lines.join('\n\n')+(standings?`\n\nCurrent standings: ${standings}`:'');
}



async function checkAndAutoSettle() {
  const openBets = S.bets.filter(b => b.status === 'open');
  if (!openBets.length) return;

  for (const sport of [...new Set(openBets.map(b => b.sport))]) {
    try {
      // check both today and yesterday's scoreboard
      const urls = [ESPN[sport], ESPN[sport] + '?dates=' + getYesterdayStr()];
      for (const url of urls) {
        const d = await safeJson(url);
        const events = d?.events || [];
        for (const event of events) {
          const comp = event.competitions[0];
          if (!event.status.type.name.includes('FINAL')) continue;
          const home = comp.competitors.find(c => c.homeAway === 'home');
          const away = comp.competitors.find(c => c.homeAway === 'away');
          const homeScore = parseFloat(home.score || 0);
          const awayScore = parseFloat(away.score || 0);
          const homeName = home.team.displayName;
          const awayName = away.team.displayName;
          const homeAbbr = home.team.abbreviation.toLowerCase();
          const awayAbbr = away.team.abbreviation.toLowerCase();
          const homeShort = home.team.shortDisplayName?.toLowerCase() || '';
          const awayShort = away.team.shortDisplayName?.toLowerCase() || '';

          for (const bet of openBets.filter(b => b.sport === sport)) {
            if (bet.status !== 'open') continue;
            const matchup = bet.matchup.toLowerCase();
            const pick = bet.pick.toLowerCase();

            // fuzzy match: check if any name variant appears in the matchup string
            const homeTokens = [homeName.toLowerCase(), homeAbbr, homeShort, ...homeName.toLowerCase().split(' ')];
            const awayTokens = [awayName.toLowerCase(), awayAbbr, awayShort, ...awayName.toLowerCase().split(' ')];

            const matchesHome = homeTokens.some(t => t.length > 2 && matchup.includes(t));
            const matchesAway = awayTokens.some(t => t.length > 2 && matchup.includes(t));
            if (!matchesHome && !matchesAway) continue;

            // figure out which side the bet is on
            const pickMatchesHome = homeTokens.some(t => t.length > 2 && pick.includes(t));
            const pickMatchesAway = awayTokens.some(t => t.length > 2 && pick.includes(t));

            let result;
            if (homeScore === awayScore) result = 'pushed';
            else if (pickMatchesHome && homeScore > awayScore) result = 'won';
            else if (pickMatchesAway && awayScore > homeScore) result = 'won';
            else if (!pickMatchesHome && !pickMatchesAway) continue; // can't determine pick side
            else result = 'lost';

            autoSettle(bet.id, result, homeName, awayName, homeScore, awayScore);
          }
        }
      }
    } catch(e) { /* silently skip */ }
  }
}

function getYesterdayStr() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0,10).replace(/-/g,'');
}


function autoSettle(id, result, home, away, homeScore, awayScore) {
  const b = S.bets.find(x => x.id === id);
  if (!b || b.status !== 'open') return;
  b.status = result;
  b.settledAt = new Date().toISOString();
  b.autoSettled = true;
  b.finalScore = `${away} ${awayScore} - ${homeScore} ${home}`;
  if (result === 'won') {
    b.pnl = Math.round((b.stake * b.odds - b.stake) * 100) / 100;
    S.bankroll = Math.round((S.bankroll + b.stake * b.odds) * 100) / 100;
  } else if (result === 'pushed') {
    b.pnl = 0;
    S.bankroll = Math.round((S.bankroll + b.stake) * 100) / 100;
  } else {
    b.pnl = -b.stake;
  }
  save();
  renderSidebar();

  // notify in chat
  const emoji = result === 'won' ? '🟢' : result === 'lost' ? '🔴' : '⚪';
  const msg = `${emoji} **Auto-settled:** ${b.matchup}\nPick: **${b.pick}** — **${result.toUpperCase()}**\nFinal score: ${b.finalScore}\nP&L: **${b.pnl >= 0 ? '+' : ''}$${b.pnl.toFixed(2)}**`;
  addMsg('ai', mdToHtml(msg), msg);
}

/* ── MATH ── */
function kelly(p, odds) { const b=odds-1; if(b<=0)return 0; return Math.max((b*p-(1-p))/b,0); }
function calcStake(p, odds) {
  const prof = PROFILES[S.risk];
  const openExp = S.bets.filter(b=>b.status==='open').reduce((s,b)=>s+b.stake,0);
  const imp=1/odds, edge=p-imp, ev=p*(odds-1)-(1-p);
  if (edge < prof.minEdge) return {stake:0,edge,ev,imp,reason:`Edge ${(edge*100).toFixed(1)}% below ${(prof.minEdge*100).toFixed(0)}% minimum`};
  const fk = kelly(p,odds);
  if (fk<=0) return {stake:0,edge,ev,imp,reason:'No edge — pass'};
  const frac = Math.min(fk*prof.kf, prof.maxS);
  const room = Math.max(S.bankroll*prof.maxE - openExp, 0);
  const stake = Math.min(S.bankroll*frac, room);
  if (stake<=0) return {stake:0,edge,ev,imp,reason:'Exposure cap reached'};
  return {stake:Math.round(stake*100)/100, edge, ev, imp, fkPct:(fk*100).toFixed(1), usedPct:((stake/S.bankroll)*100).toFixed(1), reason:''};
}

/* ── PARLAY LOGIC ── */
function calcParlayStake(legs) {
  // Combined odds = product of all leg odds
  // Combined prob = product of all leg probs (assumes independence)
  const combinedOdds = legs.reduce((acc, l) => acc * l.odds, 1);
  const combinedProb = legs.reduce((acc, l) => acc * l.prob, 1);
  const prof = PROFILES[S.risk];
  const openExp = S.bets.filter(b => b.status === 'open').reduce((s, b) => s + b.stake, 0);
  const imp = 1 / combinedOdds;
  const edge = combinedProb - imp;
  const ev = combinedProb * (combinedOdds - 1) - (1 - combinedProb);
  if (edge < prof.minEdge) return { stake: 0, edge, ev, combinedOdds, combinedProb, reason: `Parlay edge ${(edge*100).toFixed(1)}% below minimum` };
  const fk = Math.max((combinedOdds - 1) * combinedProb - (1 - combinedProb), 0) / (combinedOdds - 1);
  if (fk <= 0) return { stake: 0, edge, ev, combinedOdds, combinedProb, reason: 'No Kelly edge on parlay' };
  // Use half the normal Kelly fraction for parlays — they're riskier
  const frac = Math.min(fk * prof.kf * 0.5, prof.maxS * 0.6);
  const room = Math.max(S.bankroll * prof.maxE - openExp, 0);
  const stake = Math.min(S.bankroll * frac, room);
  if (stake <= 0) return { stake: 0, edge, ev, combinedOdds, combinedProb, reason: 'Exposure cap reached' };
  return { stake: Math.round(stake * 100) / 100, edge, ev, combinedOdds, combinedProb, usedPct: ((stake/S.bankroll)*100).toFixed(1), reason: '' };
}

  S.bankroll = Math.round((S.bankroll - b.stake) * 100) / 100;
  S.pendingBet = null; save(); renderSidebar();
  const msg = `Parlay logged ✓\n\n**$${bet.stake.toFixed(2)}** on ${bet.legs.length} legs\nPotential return: **$${(bet.stake*bet.odds).toFixed(2)}**\n\n⚡ All legs must win. I'll auto-settle when results are in.`;
  addMsg('ai', mdToHtml(msg), msg);
}


function settleBet(id, result) {
  const b = S.bets.find(x=>x.id===id); if(!b||b.status!=='open') return;
  b.status=result; b.settledAt=new Date().toISOString();
  if(result==='won'){b.pnl=Math.round((b.stake*b.odds-b.stake)*100)/100;S.bankroll=Math.round((S.bankroll+b.stake*b.odds)*100)/100}
  else if(result==='pushed'){b.pnl=0;S.bankroll=Math.round((S.bankroll+b.stake)*100)/100}
  else{b.pnl=-b.stake}
  save(); renderSidebar();
}

function clearHistory() {
  if (!confirm('Delete all settled bet history? This cannot be undone.')) return;
  S.bets = S.bets.filter(b=>b.status==='open');
  save(); renderSidebar();
}

/* ── RENDER ── */
function renderSidebar() {
  const growth = ((S.bankroll-S.start)/S.start*100);
  const gc = growth>=0?'var(--green)':'var(--red)';
  const pct = Math.min((S.bankroll/S.start)*100,100);
  const brNum = document.getElementById('brNum');
  if (brNum) {
    brNum.textContent = `$${S.bankroll.toFixed(2)}`;
    document.getElementById('brGrowth').innerHTML = `<span style="color:${gc}">${growth>=0?'+':''}${growth.toFixed(1)}% from start</span>`;
    const fill = document.getElementById('brMeter');
    fill.style.width = Math.max(pct,2)+'%';
    fill.className = 'meter-fill'+(pct<50?' crit':pct<75?' warn':'');
    const open=S.bets.filter(b=>b.status==='open');
    const settled=S.bets.filter(b=>b.status!=='open');
    const pnl=settled.reduce((s,b)=>s+(b.pnl||0),0);
    const wins=settled.filter(b=>b.status==='won').length;
    const totalStaked=settled.reduce((s,b)=>s+b.stake,0);
    const roi=totalStaked>0?(pnl/totalStaked*100):0;
    const exp=open.reduce((s,b)=>s+b.stake,0);
    document.getElementById('statsGrid').innerHTML=`
      <div class="stat-box"><div class="stat-val" style="color:var(--amber)">$${exp.toFixed(2)}</div><div class="stat-lbl">Exposure</div></div>
      <div class="stat-box"><div class="stat-val" style="color:${roi>=0?'var(--green)':'var(--red)'}">${roi>=0?'+':''}${roi.toFixed(1)}%</div><div class="stat-lbl">ROI</div></div>
      <div class="stat-box"><div class="stat-val">${wins}/${settled.length}</div><div class="stat-lbl">W/Settled</div></div>
      <div class="stat-box"><div class="stat-val" style="color:${pnl>=0?'var(--green)':'var(--red)'}">${pnl>=0?'+':''}$${pnl.toFixed(2)}</div><div class="stat-lbl">P&L</div></div>`;
    renderDesktopBets();
  }
}

function betItemHTML(b, showSettle=false) {
  const pc = b.pnl>0?'var(--green)':b.pnl<0?'var(--red)':'var(--muted)';
  const ps = b.pnl!=null?(b.pnl>=0?'+':'')+`$${Math.abs(b.pnl).toFixed(2)}`:'';
  const autoBadge = b.autoSettled?`<span class="auto-badge ${b.status}">⚡ auto</span>`:'';
  const score = b.finalScore?`<div style="font-size:10px;color:var(--muted);margin-top:2px">${b.finalScore}</div>`:'';
  return `<div class="bet-item ${b.status}">
    <div class="bi-matchup">${b.matchup} ${autoBadge}</div>
    <div class="bi-detail">${b.sport} · ${b.pick} · ${b.market}${b.status!=='open'?' · '+new Date(b.placedAt).toLocaleDateString():''}</div>
    ${score}
    <div class="bi-row" style="margin-top:6px">
      <div class="bi-amt">$${b.stake.toFixed(2)}${b.status!=='open'?`<span style="font-size:12px;color:${pc};margin-left:6px">${ps}</span>`:''}</div>
      ${showSettle?`<div class="settle-btns">
        <button class="s-btn w" onclick="settleBet('${b.id}','won')">Won</button>
        <button class="s-btn l" onclick="settleBet('${b.id}','lost')">Lost</button>
        <button class="s-btn p" onclick="settleBet('${b.id}','pushed')">Push</button>
      </div>`:''}
    </div>
  </div>`;
}

function renderDesktopBets() {
  const open=S.bets.filter(b=>b.status==='open');
  const hist=[...S.bets].filter(b=>b.status!=='open').reverse();
  const dOpen=document.getElementById('dViewOpen');
  const dHist=document.getElementById('dViewHistory');
  if(!dOpen)return;
  dOpen.innerHTML = open.length===0
    ?'<div class="empty-bets">No open bets.<br>Ask BetPilot for a pick!<br><br><small style="color:var(--dim)">⚡ Bets auto-settle via ESPN</small></div>'
    :open.map(b=>betItemHTML(b,true)).join('');
  dHist.innerHTML = hist.length===0
    ?'<div class="empty-bets">No history yet.</div>'
    :hist.map(b=>betItemHTML(b,false)).join('')
     +`<button class="clear-btn" onclick="clearHistory()">🗑 Clear history</button>`;
}

function dSideTab(tab) {
  ['open','history','stats'].forEach(t => {
    document.getElementById('dView'+t.charAt(0).toUpperCase()+t.slice(1))?.classList.toggle('hidden',t!==tab);
    document.getElementById('dTab'+t.charAt(0).toUpperCase()+t.slice(1))?.classList.toggle('on',t===tab);
  });
  if (tab==='stats') renderStatsPanel(document.getElementById('dViewStats'));
}

function renderStatsPanel(container) {
  if (!container) return;
  const settled = S.bets.filter(b => b.status !== 'open');
  const open = S.bets.filter(b => b.status === 'open');
  const wins = settled.filter(b => b.status === 'won');
  const losses = settled.filter(b => b.status === 'lost');
  const totalStaked = settled.reduce((s,b) => s+b.stake, 0);
  const totalPnl = settled.reduce((s,b) => s+(b.pnl||0), 0);
  const roi = totalStaked > 0 ? (totalPnl/totalStaked*100) : 0;
  const growth = ((S.bankroll - S.start) / S.start * 100);
  const winRate = settled.length > 0 ? (wins.length/settled.length*100) : 0;

  // Bankroll over time — reconstruct from bets
  const timeline = [{t: 'Start', v: S.start}];
  const sortedSettled = [...settled].sort((a,b) => new Date(a.settledAt||a.placedAt) - new Date(b.settledAt||b.placedAt));
  let running = S.start;
  sortedSettled.forEach(b => {
    running = Math.round((running + (b.pnl||0)) * 100) / 100;
    const d = new Date(b.settledAt||b.placedAt);
    timeline.push({t: d.toLocaleDateString([], {month:'short',day:'numeric'}), v: running, status: b.status});
  });
  timeline.push({t: 'Now', v: S.bankroll});

  // ROI by sport
  const bySport = {};
  settled.forEach(b => {
    if (!bySport[b.sport]) bySport[b.sport] = {staked:0, pnl:0, count:0};
    bySport[b.sport].staked += b.stake;
    bySport[b.sport].pnl += (b.pnl||0);
    bySport[b.sport].count++;
  });

  // Chart dimensions
  const W = 260, H = 80;
  const vals = timeline.map(p => p.v);
  const min = Math.min(...vals) * 0.98;
  const max = Math.max(...vals) * 1.02;
  const range = max - min || 1;
  const pts = timeline.map((p, i) => {
    const x = (i / Math.max(timeline.length-1, 1)) * W;
    const y = H - ((p.v - min) / range) * H;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');

  // Color dots on chart
  const dots = timeline.slice(1).map((p, i) => {
    const x = ((i+1) / Math.max(timeline.length-1, 1)) * W;
    const y = H - ((p.v - min) / range) * H;
    const c = p.status === 'won' ? '#2ED573' : p.status === 'lost' ? '#FF4757' : '#6B7FA3';
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="${c}"/>`;
  }).join('');

  const sportRows = Object.entries(bySport).map(([sport, d]) => {
    const sroi = d.staked > 0 ? (d.pnl/d.staked*100) : 0;
    const color = sroi >= 0 ? '#2ED573' : '#FF4757';
    const barW = Math.min(Math.abs(sroi) * 2, 100);
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
        <span>${sport}</span>
        <span style="color:${color};font-weight:600">${sroi>=0?'+':''}${sroi.toFixed(1)}% ROI (${d.count} bets)</span>
      </div>
      <div style="height:4px;background:var(--dim);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${barW}%;background:${color};border-radius:2px"></div>
      </div>
    </div>`;
  }).join('');

  // Streak
  let streak = 0, streakType = '';
  for (let i = sortedSettled.length-1; i >= 0; i--) {
    const s = sortedSettled[i].status;
    if (i === sortedSettled.length-1) { streakType = s; streak = 1; }
    else if (s === streakType) streak++;
    else break;
  }
  const streakStr = streak > 0 ? `${streak} ${streakType === 'won' ? '🟢' : '🔴'} in a row` : '—';
  const avgStake = totalStaked > 0 ? (totalStaked / settled.length).toFixed(2) : '0.00';
  const avgOdds = settled.length > 0 ? (settled.reduce((s,b)=>s+b.odds,0)/settled.length).toFixed(2) : '0.00';
  const parlays = settled.filter(b => b.isParlay);
  const singles = settled.filter(b => !b.isParlay);
  const singlesWinRate = singles.length > 0 ? (singles.filter(b=>b.status==='won').length/singles.length*100).toFixed(0) : '0';
  const parlaysWinRate = parlays.length > 0 ? (parlays.filter(b=>b.status==='won').length/parlays.length*100).toFixed(0) : '—';

  container.innerHTML = `<div style="padding:12px;overflow-y:auto;height:100%">

    <!-- BANKROLL CHART -->
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px">Bankroll over time</div>
    ${timeline.length < 2
      ? '<div style="font-size:12px;color:var(--muted);padding:20px 0;text-align:center">Settle some bets to see your chart</div>'
      : `<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px">
          <svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">
            <polyline points="${pts}" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linejoin="round"/>
            <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#00E5B4" stop-opacity="0.3"/>
              <stop offset="100%" stop-color="#00E5B4" stop-opacity="0"/>
            </linearGradient>
            <polygon points="${pts} ${W},${H} 0,${H}" fill="url(#cg)"/>
            ${dots}
          </svg>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px">
            <span>$${S.start.toFixed(0)}</span>
            <span style="color:${growth>=0?'var(--green)':'var(--red)'};font-weight:600">${growth>=0?'+':''}${growth.toFixed(1)}%</span>
            <span>$${S.bankroll.toFixed(0)}</span>
          </div>
        </div>`
    }

    <!-- KEY STATS -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px">
      <div class="stat-box"><div class="stat-val" style="color:${roi>=0?'var(--green)':'var(--red)'}">${roi>=0?'+':''}${roi.toFixed(1)}%</div><div class="stat-lbl">Overall ROI</div></div>
      <div class="stat-box"><div class="stat-val">${winRate.toFixed(0)}%</div><div class="stat-lbl">Win rate</div></div>
      <div class="stat-box"><div class="stat-val">${wins.length}W / ${losses.length}L</div><div class="stat-lbl">Record</div></div>
      <div class="stat-box"><div class="stat-val" style="color:${totalPnl>=0?'var(--green)':'var(--red)'}">${totalPnl>=0?'+':''}$${totalPnl.toFixed(2)}</div><div class="stat-lbl">Total P&L</div></div>
      <div class="stat-box"><div class="stat-val">$${avgStake}</div><div class="stat-lbl">Avg stake</div></div>
      <div class="stat-box"><div class="stat-val">${avgOdds}x</div><div class="stat-lbl">Avg odds</div></div>
      <div class="stat-box"><div class="stat-val">${streakStr}</div><div class="stat-lbl">Current streak</div></div>
      <div class="stat-box"><div class="stat-val">${singlesWinRate}% / ${parlaysWinRate}%</div><div class="stat-lbl">Single / Parlay W%</div></div>
    </div>

    <!-- ROI BY SPORT -->
    ${Object.keys(bySport).length > 0 ? `
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px">ROI by sport</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px">
      ${sportRows}
    </div>` : ''}

    <!-- OPEN EXPOSURE -->
    ${open.length > 0 ? `
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px">Open exposure</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px">
      ${open.map(b => {
        const pct = (b.stake/S.bankroll*100).toFixed(1);
        return `<div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
            <span style="color:var(--txt)">${b.pick}</span><span style="color:var(--amber)">$${b.stake.toFixed(2)} (${pct}%)</span>
          </div>
          <div style="font-size:10px;color:var(--muted)">${b.matchup} · ${b.sport}</div>
        </div>`;
      }).join('')}
    </div>` : ''}

  </div>`;
}


/* ── MOBILE ── */
function mobileTab(tab) {
  if(window.innerWidth>768)return;
  ['chat','bankroll','bets','history','stats'].forEach(t=>{
    document.getElementById('mnav'+t.charAt(0).toUpperCase()+t.slice(1))?.classList.toggle('on',t===tab);
  });
  const chatPanel=document.getElementById('chatPanel');
  document.querySelectorAll('.mobile-panel').forEach(p=>p.remove());
  if(tab==='chat'){chatPanel.style.display='flex';return}
  chatPanel.style.display='none';
  const panel=document.createElement('div');
  panel.className='mobile-panel active';

  if(tab==='bankroll'){
    const open=S.bets.filter(b=>b.status==='open');
    const settled=S.bets.filter(b=>b.status!=='open');
    const pnl=settled.reduce((s,b)=>s+(b.pnl||0),0);
    const wins=settled.filter(b=>b.status==='won').length;
    const exp=open.reduce((s,b)=>s+b.stake,0);
    const totalStaked=settled.reduce((s,b)=>s+b.stake,0);
    const roi=totalStaked>0?(pnl/totalStaked*100):0;
    const growth=((S.bankroll-S.start)/S.start*100);
    const gc=growth>=0?'var(--green)':'var(--red)';
    const pct=Math.min((S.bankroll/S.start)*100,100);
    const fc=pct<50?'crit':pct<75?'warn':'';
    panel.innerHTML=`<div style="padding:20px;overflow-y:auto;flex:1">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)">Bankroll</span>
        <button onclick="openSetup()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer">⚙</button>
      </div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:700;color:var(--teal);line-height:1">$${S.bankroll.toFixed(2)}</div>
      <div style="font-size:13px;font-weight:600;color:${gc};margin-bottom:10px">${growth>=0?'+':''}${growth.toFixed(1)}% from start</div>
      <div class="meter-track"><div class="meter-fill ${fc}" style="width:${Math.max(pct,2)}%"></div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px">
        <div class="stat-box"><div class="stat-val" style="color:var(--amber)">$${exp.toFixed(2)}</div><div class="stat-lbl">Exposure</div></div>
        <div class="stat-box"><div class="stat-val" style="color:${roi>=0?'var(--green)':'var(--red)'}">${roi>=0?'+':''}${roi.toFixed(1)}%</div><div class="stat-lbl">ROI</div></div>
        <div class="stat-box"><div class="stat-val">${wins}/${settled.length}</div><div class="stat-lbl">W/Settled</div></div>
        <div class="stat-box"><div class="stat-val" style="color:${pnl>=0?'var(--green)':'var(--red)'}">${pnl>=0?'+':''}$${pnl.toFixed(2)}</div><div class="stat-lbl">P&L</div></div>
      </div>
      <div style="margin-top:16px;font-size:12px;color:var(--muted);text-align:center">⚡ Bets auto-settle via ESPN scores</div>
    </div>`;
  } else if(tab==='bets'){
    const open=S.bets.filter(b=>b.status==='open');
    panel.innerHTML=`<div style="padding:16px;overflow-y:auto;flex:1">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px">${open.length} open bets</div>
      ${open.length===0
        ?'<div class="empty-bets">No open bets.<br>Ask BetPilot for a pick!<br><br><small style="color:var(--dim)">⚡ Bets auto-settle via ESPN</small></div>'
        :open.map(b=>`<div class="bet-item">
          <div class="bi-matchup">${b.matchup}</div>
          <div class="bi-detail">${b.sport} · ${b.pick} · ${b.market}</div>
          <div class="bi-row" style="margin-top:6px">
            <div class="bi-amt">$${b.stake.toFixed(2)}<span style="font-size:11px;color:var(--muted)"> → $${(b.stake*b.odds).toFixed(2)}</span></div>
            <div class="settle-btns">
              <button class="s-btn w" onclick="settleBet('${b.id}','won');mobileTab('bets')">Won</button>
              <button class="s-btn l" onclick="settleBet('${b.id}','lost');mobileTab('bets')">Lost</button>
              <button class="s-btn p" onclick="settleBet('${b.id}','pushed');mobileTab('bets')">Push</button>
            </div>
          </div></div>`).join('')}
    </div>`;
  } else if(tab==='history'){
    const hist=[...S.bets].filter(b=>b.status!=='open').reverse();
    panel.innerHTML=`<div style="padding:16px;overflow-y:auto;flex:1">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px">Settled bets</div>
      ${hist.length===0
        ?'<div class="empty-bets">No settled bets yet.</div>'
        :hist.map(b=>betItemHTML(b,false)).join('')
         +'<button class="clear-btn" onclick="clearHistory();mobileTab(\'history\')">🗑 Clear history</button>'}
    </div>`;
  } else if(tab==='stats'){
    panel.style.overflow='hidden';
    renderStatsPanel(panel);
  }

  const nav=document.querySelector('.mobile-nav');
  document.getElementById('app').insertBefore(panel,nav);
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}

/* ── INIT ── */
load();
if(S.initialized){
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='';
  renderSidebar();
  loadSportChat(S.sport);
  setInterval(checkAndAutoSettle,120000);
  checkAndAutoSettle();
}
</script>
</body>
</html>
